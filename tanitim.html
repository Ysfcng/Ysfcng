<!DOCTYPE html><html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profesyonel Hizmetler</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 40px;
  max-width: 420px;
  width: 100%;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.1);
}

h1 {
  font-size: 28px;
  margin-bottom: 10px;
  font-weight: 600;
}

.location {
  font-size: 14px;
  opacity: 0.8;
  margin-bottom: 25px;
}

.price {
  font-size: 36px;
  font-weight: 600;
  margin: 20px 0;
  color: #00ffd5;
}

.details {
  margin: 20px 0;
  line-height: 1.6;
  font-size: 16px;
}

.highlight {
  background: rgba(0,255,213,0.15);
  padding: 10px;
  border-radius: 10px;
  margin-top: 15px;
  font-weight: 500;
}

.contact {
  margin-top: 30px;
}

.phone {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 15px;
}

.btn {
  display: inline-block;
  padding: 12px 20px;
  border-radius: 10px;
  background: #00ffd5;
  color: #000;
  text-decoration: none;
  font-weight: 600;
  transition: 0.3s;
}

.btn:hover {
  background: #00c2a8;
  transform: translateY(-2px);
}

footer {
  margin-top: 20px;
  font-size: 12px;
  opacity: 0.6;
}

  </style>
</head>
<body>  <div class="card">
    <h1>Profesyonel Hizmet</h1>
    <div class="location">📍 Diyarbakır'da aktif hizmet</div><div class="price">1000 TL / Gün</div>

<div class="details">
  ✔ Tüm işler yapılır<br>
  ✔ Hızlı ve güvenilir hizmet<br>
  ✔ Ödeme: Peşin
</div>

<div class="highlight">Her türlü iş için iletişime geçebilirsiniz</div>

<div class="contact">
  <div class="phone">📞 0534 784 40 31</div>
  <a class="btn" href="tel:05347844031">Hemen Ara</a>
</div>

<footer>
  © 2026 Tüm hakları saklıdır
</footer>

  </div></body>
</html>
